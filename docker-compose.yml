services:

  # ─── Infrastructure ────────────────────────────────────────────────────────

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:3
    container_name: localstack
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mediaflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Services ──────────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - HTTP_ADDR=:8080
      - UPLOAD_SERVICE_ADDR=upload-service:50051
      - MEDIA_QUERY_SERVICE_ADDR=http://media-query-service:8086
      - SAGA_ORCHESTRATOR_ADDR=saga-orchestrator:50051
    depends_on:
      - upload-service
      - media-query-service
      - saga-orchestrator

  upload-service:
    build:
      context: ./services/upload-service
    container_name: upload-service
    ports:
      - "8081:50051"
    environment:
      - GRPC_ADDR=:50051
      - DB_DSN=postgres://postgres:postgres@postgres:5432/mediaflow?sslmode=disable
      - S3_ENDPOINT=http://localstack:4566
      - S3_BUCKET=mediaflow
      - S3_REGION=us-east-1
    depends_on:
      kafka:
        condition: service_healthy
      localstack:
        condition: service_started
      postgres:
        condition: service_healthy

  saga-orchestrator:
    build:
      context: ./services/saga-orchestrator
    container_name: saga-orchestrator
    ports:
      - "8082:50051"
    environment:
      - GRPC_ADDR=:50051
      - DB_DSN=postgres://postgres:postgres@postgres:5432/mediaflow?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  transcoding-service:
    build:
      context: ./services/transcoding-service
    container_name: transcoding-service
    ports:
      - "8083:50051"
    depends_on:
      kafka:
        condition: service_healthy
      localstack:
        condition: service_started

  thumbnail-service:
    build:
      context: ./services/thumbnail-service
    container_name: thumbnail-service
    ports:
      - "8084:50051"
    depends_on:
      kafka:
        condition: service_healthy
      localstack:
        condition: service_started

  metadata-service:
    build:
      context: ./services/metadata-service
    container_name: metadata-service
    ports:
      - "8085:50051"
    depends_on:
      kafka:
        condition: service_healthy

  notification-service:
    build:
      context: ./services/notification-service
    container_name: notification-service
    depends_on:
      kafka:
        condition: service_healthy

  media-query-service:
    build:
      context: ./services/media-query-service
    container_name: media-query-service
    ports:
      - "8086:8086"
    environment:
      - HTTP_ADDR=:8086
      - DB_DSN=postgres://postgres:postgres@postgres:5432/mediaflow?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  localstack_data:
