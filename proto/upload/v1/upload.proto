syntax = "proto3";

package mediaflow.upload.v1;

option go_package = "github.com/tolgafiratoglu/mediaflow/proto/upload/v1;uploadv1";

import "google/protobuf/timestamp.proto";
import "common/v1/common.proto";

// ─── Domain ────────────────────────────────────────────────────────────────

// Upload represents a single client-initiated upload session. It is created
// when a presigned URL is issued and transitions to UPLOADED once the client
// confirms the S3 PUT completed. From there, a Media aggregate is created
// and the saga is started.
message Upload {
  string                       upload_id     = 1;
  string                       user_id       = 2;
  string                       file_name     = 3;
  string                       content_type  = 4;
  int64                        size_bytes    = 5;
  string                       s3_bucket     = 6;
  string                       s3_key        = 7;
  mediaflow.common.v1.Status   status        = 8;
  string                       media_id      = 9;  // populated after confirm
  string                       saga_id       = 10; // populated after confirm
  google.protobuf.Timestamp    expires_at    = 11;
  mediaflow.common.v1.Audit    audit         = 12;
}

// ─── RPC: CreatePresignedUpload ────────────────────────────────────────────

message CreatePresignedUploadRequest {
  string user_id      = 1;
  string file_name    = 2;
  string content_type = 3;
  int64  size_bytes   = 4;
}

message CreatePresignedUploadResponse {
  string                       upload_id  = 1;
  string                       url        = 2; // presigned PUT URL
  map<string, string>          headers    = 3; // headers the client must send
  google.protobuf.Timestamp    expires_at = 4;
}

// ─── RPC: ConfirmUpload ────────────────────────────────────────────────────

message ConfirmUploadRequest {
  string upload_id = 1;
  // ETag returned by S3, used for integrity verification.
  string etag      = 2;
}

message ConfirmUploadResponse {
  string                       media_id = 1;
  string                       saga_id  = 2;
  mediaflow.common.v1.Status   status   = 3;
}

// ─── RPC: Get / Cancel ─────────────────────────────────────────────────────

message GetUploadRequest  { string upload_id = 1; }

message CancelUploadRequest  { string upload_id = 1; string reason = 2; }
message CancelUploadResponse { mediaflow.common.v1.Status status = 1; }

// ─── Domain events (Outbox payloads) ───────────────────────────────────────

// MediaUploaded is produced when ConfirmUpload succeeds. Partition key on
// Kafka is media_id so that all subsequent events for the same media are
// processed in order by a single consumer instance.
message MediaUploaded {
  string                       media_id     = 1;
  string                       upload_id    = 2;
  string                       user_id      = 3;
  string                       s3_bucket    = 4;
  string                       s3_key       = 5;
  string                       content_type = 6;
  int64                        size_bytes   = 7;
  google.protobuf.Timestamp    uploaded_at  = 8;
}

message UploadCancelled {
  string upload_id = 1;
  string reason    = 2;
}

// ─── Service ───────────────────────────────────────────────────────────────

service UploadService {
  rpc CreatePresignedUpload(CreatePresignedUploadRequest) returns (CreatePresignedUploadResponse);
  rpc ConfirmUpload(ConfirmUploadRequest)                 returns (ConfirmUploadResponse);
  rpc GetUpload(GetUploadRequest)                         returns (Upload);
  rpc CancelUpload(CancelUploadRequest)                   returns (CancelUploadResponse);
}
